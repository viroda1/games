<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BLAACK WhOLE — click to grow the singularity</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #020210, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,180,60,0.1);
            border: 1px solid #ffbb66;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 0 2px #f0a05040;
            cursor: crosshair;
            transition: all 0.2s;
        }

        .info-panel {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            background: #050505aa;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 28px;
            border: 1px solid #ffaa6644;
        }

        .mass-box {
            background: #000000aa;
            padding: 6px 18px;
            border-radius: 40px;
            text-align: center;
        }

        .mass-box span {
            font-size: 2rem;
            font-weight: bold;
            color: #ffdd99;
            text-shadow: 0 0 6px #ff9900;
            letter-spacing: 2px;
        }

        .level-box {
            background: #1f1a0eaa;
            padding: 6px 24px;
            border-radius: 40px;
            text-align: center;
        }

        .level-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f7c873;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .next-progress {
            flex: 1;
            min-width: 180px;
        }

        .progress-bar-bg {
            background: #2a241a;
            border-radius: 30px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px black;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: radial-gradient(circle, #ffaa55, #ff6600);
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        .next-threshold {
            font-size: 0.75rem;
            color: #ccaa77;
            margin-top: 5px;
            text-align: center;
        }

        .click-stats {
            font-size: 0.9rem;
            background: #1c1308aa;
            padding: 5px 15px;
            border-radius: 32px;
            color: #ffcc88;
        }

        button {
            background: #2f2419;
            border: 1px solid #ffaa55;
            color: #ffddbb;
            font-family: monospace;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 1rem;
        }

        button:hover {
            background: #5f451f;
            transform: scale(0.97);
            box-shadow: 0 0 12px #ffaa55;
        }

        .title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: #f0c27b;
            text-shadow: 0 0 8px #a55218, 0 0 3px #ffbb77;
            word-break: keep-all;
        }

        .title small {
            font-size: 0.7rem;
            display: block;
            letter-spacing: 3px;
            color: #bfa16e;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 14px;
            color: #987b50;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="title">
            ⚫ BLAACK WhOLE ⚫
            <small>▸ click the singularity · consume mass · evolve ◂</small>
        </div>
        <canvas id="blackholeCanvas" width="900" height="600" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/600"></canvas>

        <div class="info-panel">
            <div class="mass-box">
                <div style="font-size:0.7rem; color:#cb9e68;">⚫ TOTAL MASS</div>
                <span id="massDisplay">0</span>
                <span style="font-size:0.9rem;"> M☉</span>
            </div>
            <div class="level-box">
                <div style="font-size:0.7rem;">🌀 EVENT HORIZON LEVEL</div>
                <div class="level-name" id="levelName">MICRO QUASAR</div>
            </div>
            <div class="next-progress">
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="next-threshold" id="nextThresholdTxt">next: 50 M☉</div>
            </div>
            <div class="click-stats">
                💥 <span id="clickPower">+5</span> M☉ per click
            </div>
            <button id="resetBtn">⟳ RESET SINGULARITY</button>
        </div>
        <footer>▼ click the black hole to feed it — each devouring increases gravitational pull & size</footer>
    </div>
</div>

<script>
    (function(){
        // ---------- BLACK HOLE SIMULATION ----------
        const canvas = document.getElementById('blackholeCanvas');
        const ctx = canvas.getContext('2d');
        
        // game state
        let mass = 12.0;           // solar masses (starting mass)
        let baseClickGain = 5;     // mass per click
        
        // level thresholds (in M☉)
        const levels = [
            { name: "MICRO QUASAR",     threshold: 0,     color: "#665533", radiusScale: 0.6, lensIntensity: 0.8 },
            { name: "STELLAR REMNANT",  threshold: 50,    color: "#aa7744", radiusScale: 0.8, lensIntensity: 1.2 },
            { name: "INTERMEDIATE VOID",threshold: 200,   color: "#cc8844", radiusScale: 1.0, lensIntensity: 1.8 },
            { name: "SUPERMASSIVE ABYSS",threshold: 800,  color: "#dd9955", radiusScale: 1.3, lensIntensity: 2.5 },
            { name: "ULTRA. SINGULARITY",threshold: 2000, color: "#ffaa66", radiusScale: 1.7, lensIntensity: 3.5 }
        ];
        
        // current level index (derived from mass)
        let currentLevel = 0;
        
        // visual effects
        let accretionParticles = [];
        let lastClickTime = 0;
        let clickFlash = 0;
        let starField = [];
        const STAR_COUNT = 400;
        
        // canvas dimensions
        let w = canvas.width, h = canvas.height;
        let centerX = w/2, centerY = h/2;
        
        // black hole radius (pixels) dynamic
        let currentRadius = 32;
        
        // ---- helper: get level by mass ----
        function updateLevelFromMass() {
            let newLevel = 0;
            for(let i=levels.length-1; i>=0; i--) {
                if(mass >= levels[i].threshold) {
                    newLevel = i;
                    break;
                }
            }
            if(newLevel !== currentLevel) {
                currentLevel = newLevel;
                // visual oomph: when level up, spawn many particles
                for(let i=0; i<35; i++) {
                    addAccretionBurst();
                }
            }
            return currentLevel;
        }
        
        // helper: get next threshold mass
        function getNextThreshold() {
            if(currentLevel + 1 < levels.length) return levels[currentLevel+1].threshold;
            return null; // max level
        }
        
        // compute black hole radius based on mass & level visual scaling
        function computeRadius() {
            // schwarzschild radius visual: sqrt(mass) but with artistic range
            let base = 18 + Math.sqrt(mass) * 1.4;
            // apply level scale multiplier for epic feel
            const levelScale = levels[currentLevel].radiusScale;
            let radius = base * levelScale;
            // clamp between 28 and 210
            return Math.min(210, Math.max(28, radius));
        }
        
        // update UI elements
        function updateUI() {
            document.getElementById('massDisplay').innerText = Math.floor(mass);
            const levelObj = levels[currentLevel];
            document.getElementById('levelName').innerText = levelObj.name;
            const next = getNextThreshold();
            if(next !== null) {
                let progress = ((mass - levels[currentLevel].threshold) / (next - levels[currentLevel].threshold)) * 100;
                progress = Math.min(100, Math.max(0, progress));
                document.getElementById('progressFill').style.width = progress + "%";
                document.getElementById('nextThresholdTxt').innerHTML = `➔ next: ${next} M☉  (${Math.floor(progress)}%)`;
            } else {
                document.getElementById('progressFill').style.width = "100%";
                document.getElementById('nextThresholdTxt').innerHTML = `✦ MAXIMUM SINGULARITY ✦`;
            }
            // click power scales slightly with level (more massive black hole consumes more per click)
            let bonus = 1 + Math.floor(currentLevel * 0.8);
            let finalGain = baseClickGain + bonus;
            document.getElementById('clickPower').innerText = "+" + finalGain;
        }
        
        // add mass and grow
        function addMass(amount) {
            if(!isFinite(amount) || amount <= 0) return;
            mass += amount;
            // level update
            updateLevelFromMass();
            // recompute visual radius
            currentRadius = computeRadius();
            updateUI();
            
            // spawn particles for each click (accretion burst)
            for(let i=0; i<12 + Math.floor(amount/2); i++) {
                addAccretionParticle();
            }
            clickFlash = 0.9; // brief flash effect
        }
        
        // reset the black hole
        function resetSimulation() {
            mass = 12.0;
            currentLevel = 0;
            updateLevelFromMass();
            currentRadius = computeRadius();
            updateUI();
            accretionParticles = [];
            // add some initial shimmer
            for(let i=0;i<20;i++) addAccretionParticle();
        }
        
        // ---- particle system (accreting matter) ----
        function addAccretionParticle() {
            const angle = Math.random() * Math.PI * 2;
            const dist = currentRadius + Math.random() * 45;
            const x = centerX + Math.cos(angle) * dist;
            const y = centerY + Math.sin(angle) * dist;
            accretionParticles.push({
                x: x, y: y,
                vx: (centerX - x) * 0.045 + (Math.random() - 0.5)*0.7,
                vy: (centerY - y) * 0.045 + (Math.random() - 0.5)*0.7,
                life: 0.95,
                size: 2 + Math.random() * 4,
                color: `hsl(${30 + Math.random() * 30}, 85%, 55%)`
            });
        }
        
        function addAccretionBurst() {
            for(let i=0;i<30;i++) addAccretionParticle();
        }
        
        function updateParticles() {
            for(let i=0; i<accretionParticles.length; i++) {
                const p = accretionParticles[i];
                // move toward center with acceleration
                const dx = centerX - p.x;
                const dy = centerY - p.y;
                const distToCenter = Math.hypot(dx, dy);
                if(distToCenter < currentRadius + 3) {
                    accretionParticles.splice(i,1);
                    i--;
                    continue;
                }
                const pull = 0.12 * (1 + currentLevel*0.08);
                p.vx += dx * 0.008 * pull;
                p.vy += dy * 0.008 * pull;
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.008;
                if(p.life <= 0.02 || p.x < -50 || p.x > w+50 || p.y < -50 || p.y > h+50) {
                    accretionParticles.splice(i,1);
                    i--;
                }
            }
        }
        
        // star field generation (static but with gravitational lensing)
        function initStars() {
            starField = [];
            for(let i=0;i<STAR_COUNT;i++) {
                starField.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    radius: 1 + Math.random() * 2.2,
                    alpha: 0.6 + Math.random() * 0.5,
                    baseX: 0, baseY: 0
                });
            }
        }
        
        // draw gravitational lensing effect (warp background stars)
        function drawLensing(ctx, cx, cy, radius, intensity) {
            const maxOffset = radius * 0.25 * Math.min(2.5, intensity/2);
            for(let star of starField) {
                const dx = star.x - cx;
                const dy = star.y - cy;
                const dist = Math.hypot(dx, dy);
                if(dist < radius * 1.8) {
                    // lens distortion: shift away from center
                    const factor = (1 - dist / (radius * 1.8)) * intensity * 0.35;
                    const angle = Math.atan2(dy, dx);
                    const offsetX = Math.cos(angle) * factor * radius * 0.2;
                    const offsetY = Math.sin(angle) * factor * radius * 0.2;
                    ctx.beginPath();
                    ctx.arc(star.x + offsetX, star.y + offsetY, star.radius, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 220, 160, ${star.alpha * 0.9})`;
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 240, 200, ${star.alpha * 0.7})`;
                    ctx.fill();
                }
            }
        }
        
        // draw the accretion disk and black hole
        function drawBlackHole() {
            const radius = currentRadius;
            const lensIntensity = levels[currentLevel].lensIntensity;
            const levelColor = levels[currentLevel].color;
            
            // 1) draw outer glow / accretion disk
            const grad = ctx.createRadialGradient(centerX, centerY, radius*0.3, centerX, centerY, radius*1.7);
            grad.addColorStop(0, `rgba(80, 40, 10, 0.9)`);
            grad.addColorStop(0.6, `rgba(180, 90, 30, 0.5)`);
            grad.addColorStop(1, `rgba(40, 20, 5, 0)`);
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius*1.6, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // 2) inner accretion disk (swirling)
            for(let i=0; i<2; i++) {
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, radius*1.2, radius*0.7, Date.now()*0.002 + i, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 140, 40, 0.2)`;
                ctx.fill();
            }
            
            // 3) event horizon (black hole core)
            const radGrad = ctx.createRadialGradient(centerX-5, centerY-5, radius*0.2, centerX, centerY, radius);
            radGrad.addColorStop(0, '#0a0400');
            radGrad.addColorStop(0.7, '#1f1308');
            radGrad.addColorStop(1, '#000000');
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius*0.96, 0, Math.PI*2);
            ctx.fillStyle = radGrad;
            ctx.fill();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ff8844";
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius*0.65, 0, Math.PI*2);
            ctx.fillStyle = '#000000';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 4) inner hot plasma ring
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, radius*0.82, radius*0.45, 0, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 80, 20, 0.35)`;
            ctx.fill();
            
            // 5) add doppler / photon ring effect
            for(let r=0; r<2; r++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius*0.88 + r*3, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255, 100, 20, 0.5)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            // 6) lensing spikes (energy jets)
            const angle = Date.now() * 0.003;
            for(let i=0;i<3;i++) {
                let ang = angle + i*2.0;
                let dx = Math.cos(ang)*radius*1.1;
                let dy = Math.sin(ang)*radius*1.1;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX+dx*1.2, centerY+dy*1.2);
                ctx.lineWidth = 5;
                ctx.strokeStyle = `rgba(255, 150, 60, 0.5)`;
                ctx.stroke();
            }
        }
        
        // draw particles & click flash
        function drawParticles() {
            for(let p of accretionParticles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                ctx.fillStyle = p.color || `rgba(255, 100, 30, ${p.life*0.8})`;
                ctx.fill();
            }
        }
        
        // dynamic star field lensing + black hole
        function render() {
            if(!ctx) return;
            ctx.clearRect(0, 0, w, h);
            // deep space background gradient
            const gradBack = ctx.createLinearGradient(0,0,w*0.7,h);
            gradBack.addColorStop(0, '#03000c');
            gradBack.addColorStop(1, '#010101');
            ctx.fillStyle = gradBack;
            ctx.fillRect(0,0,w,h);
            
            // draw distant stars with lensing
            drawLensing(ctx, centerX, centerY, currentRadius, levels[currentLevel].lensIntensity);
            
            // extra cosmic dust
            ctx.fillStyle = "rgba(255,180,80,0.05)";
            for(let i=0;i<120;i++) {
                if(i%2===0) continue;
                ctx.beginPath();
                ctx.arc((i*131)%w, (i*73)%h, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // black hole + accretion disk
            drawBlackHole();
            drawParticles();
            
            // click flash effect (white/gold pulse)
            if(clickFlash > 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, currentRadius * (1 + clickFlash*0.7), 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 200, 100, ${clickFlash*0.5})`;
                ctx.fill();
                clickFlash -= 0.05;
                if(clickFlash<0) clickFlash=0;
            }
            
            // show event horizon subtle ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, currentRadius + 3, 0, Math.PI*2);
            ctx.strokeStyle = "#ffaa5533";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // extra flair: accretion spiral arcs
            let time = Date.now() * 0.004;
            for(let s=0;s<2;s++) {
                ctx.beginPath();
                for(let ang=0; ang<Math.PI*2; ang+=0.2) {
                    let rad = currentRadius*0.95 + Math.sin(ang*5 + time)*4;
                    let x = centerX + Math.cos(ang+time)*rad;
                    let y = centerY + Math.sin(ang+time)*rad;
                    if(ang===0) ctx.moveTo(x,y);
                    else ctx.lineTo(x,y);
                }
                ctx.strokeStyle = `rgba(255, 100, 40, 0.3)`;
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
        }
        
        // ---- click handling ----
        function getClickMassGain() {
            let bonus = Math.floor(currentLevel * 0.8);
            return baseClickGain + bonus;
        }
        
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // canvas physical size vs CSS
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            
            // distance from black hole center
            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            const dist = Math.hypot(dx, dy);
            // click within event horizon + some extra (accretion influence)
            const hitRadius = currentRadius + 18;
            if(dist <= hitRadius) {
                let gain = getClickMassGain();
                addMass(gain);
                // spawn extra particles on click
                for(let i=0;i<6;i++) addAccretionParticle();
                // small haptic feedback (vibration if supported)
                if(navigator.vibrate) navigator.vibrate(30);
            } else {
                // visual "miss" effect
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2);
                ctx.fillStyle = "#ffaa6666";
                ctx.fill();
                setTimeout(()=>{},20);
            }
        }
        
        // ---- animation loop ----
        function animate() {
            updateParticles();
            // update radius dynamically based on mass (real-time)
            currentRadius = computeRadius();
            render();
            requestAnimationFrame(animate);
        }
        
        // resize handling: keep center relative
        function updateCanvasSize() {
            w = canvas.width;
            h = canvas.height;
            centerX = w/2;
            centerY = h/2;
            initStars();    // regenerate stars to fit new dimensions
            currentRadius = computeRadius();
        }
        
        // reset event
        document.getElementById('resetBtn').addEventListener('click', () => {
            resetSimulation();
            accretionParticles = [];
            for(let i=0;i<25;i++) addAccretionParticle();
        });
        
        // mouse move hover effect (cursor)
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx = (e.clientX - rect.left) * scaleX;
            let my = (e.clientY - rect.top) * scaleY;
            let distToCenter = Math.hypot(mx - centerX, my - centerY);
            if(distToCenter < currentRadius + 20) {
                canvas.style.cursor = "grab";
            } else {
                canvas.style.cursor = "crosshair";
            }
        });
        
        canvas.addEventListener('click', handleCanvasClick);
        window.addEventListener('resize', () => {
            // canvas size is fixed, no need to adjust but re-center
            updateCanvasSize();
        });
        
        // initial setup
        function init() {
            updateCanvasSize();
            initStars();
            resetSimulation();
            // add initial particles
            for(let i=0;i<50;i++) addAccretionParticle();
            updateUI();
            animate();
            // passive small accretion (every 1.2 seconds adds tiny mass to simulate Hawking? but fun)
            setInterval(() => {
                if(mass < 3500) {
                    let tiny = 0.25 + (currentLevel * 0.12);
                    mass += tiny;
                    updateLevelFromMass();
                    currentRadius = computeRadius();
                    updateUI();
                    if(Math.random() < 0.3) addAccretionParticle();
                }
            }, 1700);
        }
        
        init();
    })();
</script>
</body>
</html>
