<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - 100+ Games Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Filters */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-box {
            flex: 2;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .genre-filter {
            flex: 1;
            min-width: 150px;
        }

        .genre-filter select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .reset-btn {
            padding: 12px 24px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        .reset-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* Game Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .game-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 10px 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .game-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .genre-tag {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .rating {
            background: #ffd700;
            color: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .year {
            background: #e0e0e0;
            color: #666;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .game-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .game-id {
            color: #999;
            font-size: 0.8rem;
            margin-top: 10px;
            font-family: monospace;
        }

        .play-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .play-button:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #666;
            font-size: 1.2rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GameVault</h1>
            <div class="subtitle">Your Ultimate Gaming Collection</div>
            <div class="stats" id="gameStats">Loading games...</div>
        </div>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, genre, or ID...">
            </div>
            <div class="genre-filter">
                <select id="genreSelect">
                    <option value="all">All Genres</option>
                    <option value="action">Action</option>
                    <option value="rpg">RPG</option>
                    <option value="adventure">Adventure</option>
                    <option value="puzzle">Puzzle</option>
                    <option value="strategy">Strategy</option>
                    <option value="racing">Racing</option>
                    <option value="sports">Sports</option>
                    <option value="horror">Horror</option>
                    <option value="simulation">Simulation</option>
                    <option value="casual">Casual</option>
                </select>
            </div>
            <button class="reset-btn" id="resetBtn">Reset Filters</button>
        </div>

        <div id="gamesContainer" class="games-grid">
            <div class="loading">Loading 100+ amazing games...</div>
        </div>

        <footer>
            <p>🎮 Powered by data.json | 100+ Games with Unique IDs | Click Play to Start Your Adventure!</p>
        </footer>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];

        // DOM elements
        const gamesContainer = document.getElementById('gamesContainer');
        const searchInput = document.getElementById('searchInput');
        const genreSelect = document.getElementById('genreSelect');
        const resetBtn = document.getElementById('resetBtn');
        const gameStats = document.getElementById('gameStats');

        // Load games from data.json
        async function loadGames() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error('Failed to load data.json');
                }
                const data = await response.json();
                allGames = data.games;
                filteredGames = [...allGames];
